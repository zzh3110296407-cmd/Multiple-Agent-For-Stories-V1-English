<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 8.5 UI 流程连接检查器</title>
  <style>
    :root {
      --ink: #302d29;
      --muted: #756a61;
      --soft: #9a8f82;
      --paper: #f2eadc;
      --paper-strong: #fffaf0;
      --wash: #e5d7be;
      --line: rgba(94, 76, 60, 0.18);
      --line-strong: rgba(94, 76, 60, 0.3);
      --accent: #ad7c6a;
      --accent-dark: #7a5b50;
      --sage: #5c6d62;
      --sage-dark: #40544a;
      --shadow: 0 18px 52px rgba(57, 45, 35, 0.14);
      font-family: "Inter", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 10%, rgba(255, 250, 240, 0.9), transparent 30%),
        radial-gradient(circle at 86% 4%, rgba(173, 124, 106, 0.13), transparent 30%),
        linear-gradient(120deg, #e8dfcf, #d8c8ad);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
    }

    .sidebar,
    .viewer-shell {
      border: 1px solid rgba(255, 255, 255, 0.58);
      background: rgba(246, 240, 229, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
    }

    .sidebar {
      min-height: calc(100vh - 36px);
      border-radius: 22px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .sidebar-head {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--soft);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .toolbar {
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .search {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background: rgba(255, 250, 240, 0.72);
      color: var(--ink);
      padding: 0 14px;
      outline: none;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip,
    .nav-button,
    .control-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 250, 240, 0.72);
      color: var(--muted);
      min-height: 34px;
      padding: 8px 12px;
      font-weight: 800;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .chip.active,
    .control-button.primary,
    .nav-button.active {
      border-color: rgba(92, 109, 98, 0.28);
      background: var(--sage);
      color: #fffaf0;
      box-shadow: 0 10px 24px rgba(64, 84, 74, 0.18);
    }

    .chip:hover,
    .nav-button:hover,
    .control-button:hover {
      transform: translateY(-1px);
    }

    .flow-list {
      overflow: auto;
      padding: 12px;
    }

    .flow-group {
      margin-bottom: 12px;
    }

    .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 8px 6px;
      color: var(--soft);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .group-count {
      color: var(--muted);
      font-weight: 800;
    }

    .nav-button {
      width: 100%;
      border-radius: 16px;
      padding: 12px;
      text-align: left;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      background: rgba(255, 250, 240, 0.56);
    }

    .nav-button + .nav-button {
      margin-top: 7px;
    }

    .step-number {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(92, 109, 98, 0.14);
      color: var(--sage-dark);
      font-size: 12px;
      font-weight: 900;
    }

    .nav-button.active .step-number {
      background: rgba(255, 250, 240, 0.24);
      color: #fffaf0;
    }

    .step-title {
      display: block;
      overflow: hidden;
      color: inherit;
      font-size: 14px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .step-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
      font-size: 11px;
      font-weight: 800;
    }

    .tag {
      border-radius: 999px;
      border: 1px solid rgba(94, 76, 60, 0.16);
      background: rgba(255, 250, 240, 0.48);
      padding: 3px 7px;
    }

    .sidebar-foot {
      padding: 12px 20px 18px;
      border-top: 1px solid var(--line);
      color: var(--soft);
      font-size: 12px;
      line-height: 1.6;
    }

    .viewer-shell {
      min-width: 0;
      min-height: calc(100vh - 36px);
      border-radius: 26px;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      overflow: hidden;
    }

    .viewer-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
    }

    .viewer-title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .viewer-note {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .head-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .flow-status {
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      background: rgba(255, 250, 240, 0.36);
    }

    .connection {
      display: flex;
      min-width: 0;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .connection strong {
      color: var(--ink);
    }

    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(94, 76, 60, 0.12);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--sage), var(--accent));
      transition: width 220ms ease;
    }

    .action-panel {
      padding: 12px 22px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.28);
      display: grid;
      gap: 10px;
    }

    .action-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .action-panel-title {
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-card {
      min-height: 42px;
      max-width: 320px;
      border: 1px solid rgba(94, 76, 60, 0.16);
      border-radius: 14px;
      background: rgba(255, 250, 240, 0.68);
      color: var(--ink);
      padding: 9px 12px;
      display: grid;
      gap: 4px;
      text-align: left;
      box-shadow: 0 10px 24px rgba(57, 45, 35, 0.07);
    }

    .action-card:hover {
      border-color: rgba(92, 109, 98, 0.3);
      transform: translateY(-1px);
    }

    .action-card:disabled {
      cursor: default;
      opacity: 0.58;
      transform: none;
    }

    .action-label {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.25;
    }

    .action-meta {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.35;
    }

    .frame-wrap {
      position: relative;
      min-height: 0;
      height: calc(100vh - 306px);
      min-height: 620px;
      background:
        linear-gradient(120deg, rgba(48, 45, 41, 0.06), transparent),
        rgba(236, 228, 213, 0.58);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #efe7dc;
      opacity: 1;
      transition: opacity 180ms ease;
    }

    iframe.loading {
      opacity: 0.28;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state.visible {
      display: grid;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        max-height: 56vh;
      }

      .viewer-shell {
        min-height: 82vh;
      }

      .frame-wrap {
        height: 72vh;
        min-height: 560px;
      }
    }

    @media (max-width: 680px) {
      .app {
        padding: 10px;
      }

      .sidebar,
      .viewer-shell {
        border-radius: 18px;
      }

      .viewer-head,
      .flow-status {
        grid-template-columns: 1fr;
      }

      .head-actions {
        justify-content: stretch;
      }

      .control-button {
        flex: 1 1 100%;
      }

      .action-panel-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .action-card {
        max-width: none;
        flex: 1 1 100%;
      }

      .frame-wrap {
        height: 78vh;
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="UI 流程目录">
      <header class="sidebar-head">
        <p class="eyebrow">Phase 8.5 UI Flow</p>
        <h1>流程连接检查器</h1>
        <p class="summary">用于检查所有最终 UI 原型的顺序、分支连接和页面跳转是否通顺。默认从主页开始，开场动画保留为第 1 步。</p>
      </header>

      <section class="toolbar">
        <input id="searchInput" class="search" type="search" placeholder="搜索页面、模块或连接说明" aria-label="搜索 UI 页面">
        <div class="filter-row" aria-label="筛选流程类型">
          <button class="chip active" type="button" data-filter="全部">全部</button>
          <button class="chip" type="button" data-filter="主线">主线</button>
          <button class="chip" type="button" data-filter="分支">分支</button>
          <button class="chip" type="button" data-filter="子流程">子流程</button>
          <button class="chip" type="button" data-filter="静态稿">静态稿</button>
          <button class="chip" type="button" data-filter="壳层">壳层</button>
          <button class="chip" type="button" data-filter="设置">设置</button>
        </div>
      </section>

      <nav id="flowList" class="flow-list" aria-label="全部 UI 页面顺序"></nav>

      <footer class="sidebar-foot">
        键盘可用：左/右方向键切换上一页/下一页。哈希地址会记录当前步骤，刷新后仍停留在同一页。
      </footer>
    </aside>

    <section class="viewer-shell" aria-label="UI 页面预览">
      <header class="viewer-head">
        <div>
          <p class="eyebrow" id="currentGroup">加载中</p>
          <h2 class="viewer-title" id="currentTitle">正在准备流程</h2>
          <p class="viewer-note" id="currentNote">读取最终稿连接清单。</p>
        </div>
        <div class="head-actions">
          <button id="prevButton" class="control-button" type="button">上一页</button>
          <button id="nextButton" class="control-button primary" type="button">下一页</button>
          <button id="openButton" class="control-button" type="button">打开当前页</button>
        </div>
      </header>

      <section class="flow-status">
        <div>
          <div class="connection" id="connectionText"></div>
          <div class="progress-track" aria-hidden="true"><div id="progressFill" class="progress-fill"></div></div>
        </div>
        <div class="step-meta" id="currentTags"></div>
      </section>

      <section class="action-panel" aria-label="本页交互跳转">
        <div class="action-panel-head">
          <span class="action-panel-title">本页交互</span>
          <span id="actionSummary">根据 Phase 8.5 前端 action / API 映射跳转。</span>
        </div>
        <div class="action-buttons" id="actionButtons"></div>
      </section>

      <div class="frame-wrap">
        <iframe id="previewFrame" title="当前 UI 页面预览"></iframe>
        <div id="emptyState" class="empty-state">没有匹配的页面。</div>
      </div>
    </section>
  </main>

    const flowList = document.getElementById("flowList");
    const frame = document.getElementById("previewFrame");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));
    const currentGroup = document.getElementById("currentGroup");
    const currentTitle = document.getElementById("currentTitle");
    const currentNote = document.getElementById("currentNote");
    const currentTags = document.getElementById("currentTags");
    const connectionText = document.getElementById("connectionText");
    const progressFill = document.getElementById("progressFill");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const openButton = document.getElementById("openButton");
    const actionButtons = document.getElementById("actionButtons");
    const actionSummary = document.getElementById("actionSummary");

    let activeIndex = 0;
    let activeFilter = "全部";
    let visibleIndexes = FLOW.map((_, index) => index);

    function matches(item, index, query) {
      const filterOk = activeFilter === "全部" || item.kind === activeFilter;
      const text = `${index + 1} ${item.group} ${item.title} ${item.kind} ${item.note}`.toLowerCase();
      const searchOk = !query || text.includes(query.toLowerCase());
      return filterOk && searchOk;
    }

    function renderList() {
      const query = searchInput.value.trim();
      visibleIndexes = FLOW.map((item, index) => ({ item, index }))
        .filter(({ item, index }) => matches(item, index, query))
        .map(({ index }) => index);

      flowList.innerHTML = "";
      emptyState.classList.toggle("visible", visibleIndexes.length === 0);

      const grouped = new Map();
      visibleIndexes.forEach((index) => {
        const item = FLOW[index];
        if (!grouped.has(item.group)) grouped.set(item.group, []);
        grouped.get(item.group).push(index);
      });

      grouped.forEach((indexes, group) => {
        const groupBlock = document.createElement("section");
        groupBlock.className = "flow-group";
        const title = document.createElement("div");
        title.className = "group-title";
        title.innerHTML = `<span>${group}</span><span class="group-count">${indexes.length}</span>`;
        groupBlock.append(title);

        indexes.forEach((index) => {
          const item = FLOW[index];
          const button = document.createElement("button");
          button.type = "button";
          button.className = `nav-button${index === activeIndex ? " active" : ""}`;
          button.innerHTML = `
            <span class="step-number">${index + 1}</span>
            <span>
              <span class="step-title">${item.title}</span>
              <span class="step-meta">
                <span class="tag">${item.kind}</span>
                <span class="tag">${item.group.split(" ")[0]}</span>
              </span>
            </span>
          `;
          button.addEventListener("click", () => setActive(index, true));
          groupBlock.append(button);
        });

        flowList.append(groupBlock);
      });
    }

    function actionKey(item) {
      return `${item.group}::${item.title}`;
    }

    function actionsFor(item) {
      return ACTIONS_BY_TITLE[actionKey(item)] || ACTIONS_BY_TITLE[item.title] || [];
    }

    function findTargetIndex(action) {
      if (!action.target) return -1;
      if (action.targetGroup) {
        return FLOW.findIndex((item) => item.title === action.target && item.group === action.targetGroup);
      }
      return FLOW.findIndex((item) => item.title === action.target);
    }

    function renderActions(item) {
      const actions = actionsFor(item);
      actionButtons.innerHTML = "";

      if (!actions.length) {
        actionSummary.textContent = item.kind === "静态稿"
          ? "静态参考稿不绑定后端接口。"
          : "此页暂无独立后端动作，按顺序使用上一页/下一页检查。";
        const passive = document.createElement("button");
        passive.type = "button";
        passive.className = "action-card";
        passive.disabled = true;
        passive.innerHTML = `
          <span class="action-label">无独立跳转动作</span>
          <span class="action-meta">${item.kind} / ${item.group}</span>
        `;
        actionButtons.append(passive);
        return;
      }

      actionSummary.textContent = `${actions.length} 个交互动作，来源于 Phase 8.5 前端 action/API 对照。`;
      actions.forEach((action) => {
        const targetIndex = findTargetIndex(action);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "action-card";
        button.disabled = targetIndex < 0;
        button.innerHTML = `
          <span class="action-label">${action.label}</span>
          <span class="action-meta">${action.action || "local"} / ${action.api || "no api"}</span>
          <span class="action-meta">目标：${action.target || "当前页"}${targetIndex < 0 ? "（未找到）" : ""}</span>
        `;
        if (targetIndex >= 0) {
          button.addEventListener("click", () => setActive(targetIndex, true));
        }
        actionButtons.append(button);
      });
    }

    function setActive(index, pushHash = false) {
      if (index < 0 || index >= FLOW.length) return;
      activeIndex = index;
      const item = FLOW[activeIndex];
      const previous = FLOW[activeIndex - 1];
      const next = FLOW[activeIndex + 1];

      frame.classList.add("loading");
      frame.src = item.path;
      currentGroup.textContent = item.group;
      currentTitle.textContent = item.title;
      currentNote.textContent = item.note;
      currentTags.innerHTML = `
        <span class="tag">${activeIndex + 1} / ${FLOW.length}</span>
        <span class="tag">${item.kind}</span>
        <span class="tag">${item.group}</span>
      `;
      connectionText.innerHTML = `
        <span>上一页：<strong>${previous ? previous.title : "无"}</strong></span>
        <span>-></span>
        <span>当前：<strong>${item.title}</strong></span>
        <span>-></span>
        <span>下一页：<strong>${next ? next.title : "无"}</strong></span>
      `;
      progressFill.style.width = `${((activeIndex + 1) / FLOW.length) * 100}%`;
      prevButton.disabled = activeIndex === 0;
      nextButton.disabled = activeIndex === FLOW.length - 1;
      prevButton.textContent = previous ? `上一页：${previous.title}` : "上一页";
      nextButton.textContent = next ? `下一页：${next.title}` : "下一页";
      openButton.dataset.path = item.path;
      renderActions(item);

      if (pushHash) {
        history.replaceState(null, "", `#step-${activeIndex + 1}`);
      }
      renderList();
      requestAnimationFrame(() => {
        const activeButton = flowList.querySelector(".nav-button.active");
        activeButton?.scrollIntoView({ block: "nearest", behavior: "smooth" });
      });
    }

    function moveBy(offset) {
      const currentPosition = visibleIndexes.indexOf(activeIndex);
      if (currentPosition >= 0) {
        const target = visibleIndexes[currentPosition + offset];
        if (target !== undefined) {
          setActive(target, true);
          return;
        }
      }
      setActive(activeIndex + offset, true);
    }

    frame.addEventListener("load", () => frame.classList.remove("loading"));
    prevButton.addEventListener("click", () => moveBy(-1));
    nextButton.addEventListener("click", () => moveBy(1));
    openButton.addEventListener("click", () => window.open(openButton.dataset.path, "_blank"));

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.toggle("active", item === button));
        renderList();
        if (!visibleIndexes.includes(activeIndex) && visibleIndexes.length > 0) {
          setActive(visibleIndexes[0], true);
        }
      });
    });

    searchInput.addEventListener("input", () => {
      renderList();
      if (!visibleIndexes.includes(activeIndex) && visibleIndexes.length > 0) {
        setActive(visibleIndexes[0], true);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.target === searchInput) return;
      if (event.key === "ArrowRight") moveBy(1);
      if (event.key === "ArrowLeft") moveBy(-1);
    });

    const hashMatch = window.location.hash.match(/step-(\d+)/);
    const defaultIndex = Math.max(0, FLOW.findIndex((item) => item.title === "主页 / 开始创作弹出层"));
    const initialIndex = hashMatch ? Math.max(0, Math.min(FLOW.length - 1, Number(hashMatch[1]) - 1)) : defaultIndex;
    renderList();
    setActive(initialIndex);
  </script>
</body>
</html>
