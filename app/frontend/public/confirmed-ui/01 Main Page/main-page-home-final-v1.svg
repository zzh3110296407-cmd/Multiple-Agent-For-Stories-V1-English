<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Main Page Default Visual Draft v2 Palette C Dragon v3 Figma Friendly</title>
  <desc id="desc">A Figma-friendly Morandi homepage visual draft using the original generated parchment dragon background and a lowered title stack.</desc>
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.64" numOctaves="3" seed="26" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.40 0 0 0 0 0.42 0 0 0 0 0.43 0 0 0 .045 0"/>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="dockShadow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#6F4F45" flood-opacity=".14"/>
    </filter>
    <filter id="softButtonShadow" x="-30%" y="-80%" width="160%" height="260%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#8A6257" flood-opacity=".10"/>
    </filter>
    <filter id="buttonGlassShadow" x="-30%" y="-80%" width="160%" height="260%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#7D5A50" flood-opacity=".15"/>
    </filter>
    <pattern id="quietScript" width="220" height="190" patternUnits="userSpaceOnUse">
      <path d="M28 48 C76 30 122 56 182 26" fill="none" stroke="#B48A78" stroke-width="1" opacity=".13"/>
      <path d="M18 128 C72 108 118 136 196 98" fill="none" stroke="#B48A78" stroke-width="1" opacity=".10"/>
      <path d="M116 18 L126 170" fill="none" stroke="#E9DDBF" stroke-width="1" opacity=".16"/>
    </pattern>
  </defs>

  <rect width="1440" height="1024" fill="#ECE7DC"/>
  <rect width="1440" height="1024" fill="url(#quietScript)" opacity=".54"/>
  <rect width="1440" height="1024" fill="#ECE7DC" opacity=".36" filter="url(#paperNoise)"/>

  <path d="M0 0 H1440 V178 C1168 142 986 196 746 150 C510 104 282 120 0 194 Z" fill="#E9DDBF" opacity=".76"/>
  <path d="M0 0 H352 C308 168 318 292 374 420 C438 568 410 742 306 1024 H0 Z" fill="#E9DDBF" opacity=".46"/>
  <path d="M1440 1024 H0 V802 C237 862 452 858 686 812 C937 763 1170 800 1440 742 Z" fill="#B48A78" opacity=".27"/>
  <path d="M1024 -10 C1003 180 1039 307 1158 390 C1282 477 1337 604 1274 754" fill="none" stroke="#B48A78" stroke-width="1.3" opacity=".28"/>
  <path d="M219 134 C358 216 362 340 292 458 C211 594 279 744 458 809" fill="none" stroke="#B48A78" stroke-width="1.3" opacity=".30"/>
  <path d="M360 766 C520 712 596 624 699 678 C806 734 884 688 1010 580" fill="none" stroke="#B48A78" stroke-width="1.1" opacity=".22"/>

  <g id="story-workbench-background-v5">
    <image href="assets/main-page-story-workbench-background-v5.png" xlink:href="assets/main-page-story-workbench-background-v5.png" x="0" y="0" width="1440" height="1024" preserveAspectRatio="xMidYMid slice" opacity="1"/>
  </g>

  <g transform="translate(56 44)">
    <rect x="0" y="0" width="44" height="44" rx="8" fill="#B48A78"/>
    <path d="M13 28 C18 14 28 14 32 27" fill="none" stroke="#EEE8DE" stroke-width="2" stroke-linecap="round"/>
    <path d="M14 29 C21 24 27 24 32 29" fill="none" stroke="#EEE8DE" stroke-width="2" stroke-linecap="round"/>
    <text x="60" y="19" font-family="'Inter', 'Noto Sans SC', sans-serif" font-size="17" fill="#33312D" letter-spacing="0">Multiple Agent</text>
    <text x="60" y="39" font-family="'Inter', 'Noto Sans SC', sans-serif" font-size="13" fill="#5F5A53" letter-spacing="0">For Stories</text>
  </g>

  <g transform="translate(1184 46)" font-family="'Inter', 'Noto Sans SC', sans-serif" font-size="14" fill="#4E4943">
