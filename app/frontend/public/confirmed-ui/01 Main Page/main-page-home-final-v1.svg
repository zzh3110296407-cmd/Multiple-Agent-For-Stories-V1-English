    <text x="133" y="26" text-anchor="middle" fill="#4E4943">设置</text>
  </g>

  <g transform="translate(0 96)" font-family="'Inter', 'Noto Sans SC', sans-serif">
    <text x="720" y="322" text-anchor="middle" font-size="16" fill="#6B625A" letter-spacing="0">故事创作工作台</text>
    <text x="720" y="392" text-anchor="middle" font-family="'Inter', 'Noto Sans SC', sans-serif" font-size="58" font-weight="700" fill="#2F2D2A" letter-spacing="0">Multiple Agent For Stories</text>
    <text x="720" y="445" text-anchor="middle" font-size="22" fill="#5D5650" letter-spacing="0">让世界、角色与章节在同一张长卷中苏醒</text>
  </g>

