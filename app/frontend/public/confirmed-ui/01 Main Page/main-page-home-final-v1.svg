      <rect x="0" y="0" width="154" height="54" rx="9" fill="#ECE7DC" opacity=".88" stroke="#FFFFFF" stroke-opacity=".58"/>
      <rect x="1" y="1" width="152" height="52" rx="8" fill="#B48A78" opacity=".14" stroke="#B48A78" stroke-opacity=".16"/>
      <g transform="translate(22 17)" stroke="#6D5148" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13.5V3.5"/>
        <path d="M6.2 7.3 10 3.5l3.8 3.8"/>
        <path d="M4 13.8v2.8A2.4 2.4 0 0 0 6.4 19h7.2A2.4 2.4 0 0 0 16 16.6v-2.8"/>
      </g>
      <text x="58" y="34" font-size="15" font-weight="600" fill="#373B3A">导入故事</text>
    </g>
    <g transform="translate(356 0)" filter="url(#buttonGlassShadow)">
      <rect x="0" y="0" width="154" height="54" rx="9" fill="#ECE7DC" opacity=".88" stroke="#FFFFFF" stroke-opacity=".58"/>
      <rect x="1" y="1" width="152" height="52" rx="8" fill="#E9DDBF" opacity=".30" stroke="#B48A78" stroke-opacity=".14"/>
      <g transform="translate(22 16)" stroke="#6D5148" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 2.8A6 6 0 0 0 6.5 13c.7.5 1 1.1 1 1.8h5c0-.7.3-1.3 1-1.8A6 6 0 0 0 10 2.8Z"/>
        <path d="M7.8 18h4.4"/>
        <path d="M8.2 15.2h3.6"/>
      </g>
      <text x="58" y="34" font-size="15" font-weight="600" fill="#373B3A">灵感库</text>
    </g>
    <g transform="translate(534 0)" filter="url(#buttonGlassShadow)">
      <rect x="0" y="0" width="154" height="54" rx="9" fill="#ECE7DC" opacity=".88" stroke="#FFFFFF" stroke-opacity=".58"/>
      <rect x="1" y="1" width="152" height="52" rx="8" fill="#B48A78" opacity=".12" stroke="#B48A78" stroke-opacity=".16"/>
      <g transform="translate(22 15.5)" stroke="#6D5148" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2.8h6.2L17 7.6V18a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4.8a2 2 0 0 1 2-2Z"/>
        <path d="M12 3v5h5"/>
      </g>
      <text x="58" y="34" font-size="15" font-weight="600" fill="#373B3A">创作资料库</text>
    </g>
