        <path d="M10 2.5 2.5 6.4 10 10.3 17.5 6.4 10 2.5Z"/>
        <path d="M2.5 10.2 10 14.1 17.5 10.2"/>
        <path d="M2.5 14 10 17.9 17.5 14"/>
      </g>
