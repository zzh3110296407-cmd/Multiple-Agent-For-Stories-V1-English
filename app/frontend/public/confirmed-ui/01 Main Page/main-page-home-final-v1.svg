  <g transform="translate(88 828)" font-family="'Inter', 'Noto Sans SC', sans-serif">
    <text x="0" y="0" font-size="13" fill="#726A63">上次停留</text>
    <text x="0" y="31" font-size="18" fill="#383431">第三章 · 雨夜港口</text>
    <text x="0" y="58" font-size="14" fill="#655E57">继续创作会从最近未完成的位置恢复</text>
  </g>

  <g transform="translate(1114 828)" font-family="'Inter', 'Noto Sans SC', sans-serif">
    <text x="210" y="0" text-anchor="end" font-size="13" fill="#726A63">当前主题</text>
    <text x="210" y="31" text-anchor="end" font-size="18" fill="#383431">Morandi · Dragon Parchment</text>
    <text x="210" y="58" text-anchor="end" font-size="14" fill="#655E57">#ECE7DC · #E9DDBF · #B48A78</text>
