<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Start Creation Popout Animation v5</title>
  <style>
    :root {
      --paper: #DDD4C6;
      --parchment: #CDBEAA;
      --rose: #9E7E74;
      --rose-deep: #80685D;
      --rose-soft: #B79A8F;
      --paper-deep: #D9CDBB;
      --ivory-top: #F2EDE4;
      --ivory-mid: #E8DFD2;
      --ivory-low: #D9CDBB;
      --ink: #2F2D2A;
      --muted: #655E57;
      --w: 236px;
      --h: 60px;
      --side-x: 248px;
      --side-y: -132px;
      --center-y: -132px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--paper);
      font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      cursor: pointer;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 960px;
      min-height: 680px;
      isolation: isolate;
    }

    .home {
      position: absolute;
      inset: -4%;
      background-image: url("/confirmed-ui/assets/main-page-story-workbench-background-v5.png");
      background-size: cover;
      background-position: center;
      transform: scale(1.015);
      filter: blur(0);
      animation: blurIn 720ms cubic-bezier(.18, .82, .22, 1) 70ms forwards;
      will-change: filter, transform;
    }

    .veil {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 62%, rgba(221, 212, 198, .36), rgba(205, 190, 170, .22) 35%, rgba(183, 168, 149, .18) 62%, rgba(128, 104, 93, .13)),
        rgba(47, 45, 42, .065);
      opacity: 0;
      animation: veilIn 680ms cubic-bezier(.2, .8, .2, 1) 80ms forwards;
      pointer-events: none;
    }

    .focus-glow {
      position: absolute;
      left: 50%;
      top: 59%;
      width: 700px;
      height: 280px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(.74);
      background: rgba(216, 200, 178, .26);
      filter: blur(28px);
      opacity: 0;
      animation: glowBloom 720ms cubic-bezier(.16, .86, .24, 1) 120ms forwards;
      pointer-events: none;
    }

    .cluster {
      position: absolute;
      left: 50%;
      top: 62.5%;
      width: var(--w);
      height: var(--h);
      transform: translate(-50%, -50%);
      pointer-events: auto;
    }

    .button {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--w);
      height: var(--h);
      border: 1px solid rgba(237, 227, 212, .48);
      border-radius: 9px;
      background:
        linear-gradient(180deg, rgba(242, 237, 228, .98), rgba(232, 223, 210, .96) 55%, rgba(217, 205, 187, .92)),
        rgba(232, 223, 210, .96);
      box-shadow:
        0 20px 34px rgba(91, 74, 66, .20),
        inset 0 1px 0 rgba(255, 250, 240, .40),
        inset 0 0 0 1px rgba(127, 104, 94, .24);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform-origin: center;
      opacity: 0;
      will-change: transform, opacity, box-shadow;
      letter-spacing: 0;
    }

    .button strong {
      display: block;
      font-size: 18px;
      line-height: 22px;
      font-weight: 700;
      color: #34312E;
    }

    .button span {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      line-height: 14px;
      color: #5F524B;
      white-space: nowrap;
    }

    .center {
      z-index: 3;
      background:
        linear-gradient(180deg, rgba(242, 237, 228, .98), rgba(232, 223, 210, .96) 55%, rgba(217, 205, 187, .93)),
        rgba(232, 223, 210, .96);
      border-color: rgba(255, 250, 240, .56);
      box-shadow:
        0 28px 46px rgba(79, 64, 58, .30),
        inset 0 1px 0 rgba(255, 250, 240, .42),
        inset 0 0 0 1px rgba(127, 104, 94, .28);
      animation: centerPop 660ms cubic-bezier(.16, .98, .24, 1) 205ms forwards;
    }

    .center span {
      color: #5F524B;
    }

    .left {
      z-index: 2;
      animation: leftPop 660ms cubic-bezier(.16, .98, .24, 1) 120ms forwards;
    }

    .right {
      z-index: 2;
      animation: rightPop 660ms cubic-bezier(.16, .98, .24, 1) 290ms forwards;
    }

    .ghost-cta {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--w);
      height: var(--h);
      border-radius: 8px;
      background: var(--rose);
      box-shadow: 0 12px 22px rgba(91, 74, 66, .16);
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 600;
      color: var(--ink);
      animation: ctaAbsorb 260ms cubic-bezier(.28, .8, .24, 1) forwards;
      z-index: 1;
    }

    .origin-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(128, 104, 93, .28);
      transform: translate(-50%, -50%) scale(.4);
      opacity: 0;
      animation: originPulse 620ms cubic-bezier(.18, .88, .24, 1) 45ms forwards;
      z-index: 0;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 56px;
      transform: translateX(-50%);
      color: rgba(47, 45, 42, .54);
      font-size: 13px;
      letter-spacing: 0;
      user-select: none;
    }

    .replay {
      position: absolute;
      right: 54px;
      bottom: 46px;
      color: rgba(47, 45, 42, .62);
      font-size: 13px;
      user-select: none;
    }

    @keyframes blurIn {
      0% { filter: blur(0); transform: scale(1.015); }
      100% { filter: blur(24px); transform: scale(1.055); }
    }

    @keyframes veilIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes glowBloom {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.62); }
      72% { opacity: .72; transform: translate(-50%, -50%) scale(1.04); }
      100% { opacity: .58; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes ctaAbsorb {
      0% { opacity: 1; transform: scale(1); filter: blur(0); }
      64% { opacity: .72; transform: scale(.96); filter: blur(.4px); }
      100% { opacity: 0; transform: scale(.88); filter: blur(2px); }
    }

    @keyframes originPulse {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.35); }
      28% { opacity: .8; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(3.8); }
    }

    @keyframes centerPop {
      0% { opacity: 0; transform: translate(0, 0) scale(.76); }
      22% { opacity: 0; transform: translate(0, 0) scale(.86); }
      48% { opacity: 1; }
      76% { transform: translate(0, calc(var(--center-y) - 12px)) scale(1.022); }
      100% { opacity: 1; transform: translate(0, var(--center-y)) scale(1); }
    }

    @keyframes leftPop {
      0% { opacity: 0; transform: translate(0, 0) scale(.74); }
      22% { opacity: 0; transform: translate(0, 0) scale(.84); }
      48% { opacity: 1; }
      76% { transform: translate(calc(-1 * var(--side-x) - 10px), calc(var(--side-y) - 8px)) scale(1.02); }
      100% { opacity: 1; transform: translate(calc(-1 * var(--side-x)), var(--side-y)) scale(1); }
    }

    @keyframes rightPop {
      0% { opacity: 0; transform: translate(0, 0) scale(.74); }
      22% { opacity: 0; transform: translate(0, 0) scale(.84); }
      48% { opacity: 1; }
      76% { transform: translate(calc(var(--side-x) + 10px), calc(var(--side-y) - 8px)) scale(1.02); }
      100% { opacity: 1; transform: translate(var(--side-x), var(--side-y)) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .home {
        animation: none;
        filter: blur(24px);
        transform: scale(1.055);
      }

      .veil,
      .focus-glow,
      .button,
      .ghost-cta {
        animation-duration: 1ms;
        animation-delay: 0ms;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Start Creation popout animation preview">
    <div class="home"></div>
    <div class="veil"></div>
    <div class="focus-glow"></div>
    <section class="cluster" aria-label="Start creation choices">
      <div class="origin-ring"></div>
      <button class="button left" type="button">
        <strong>新创作</strong>
        <span>开启一张新的故事长卷</span>
      </button>
      <button class="button center" type="button">
        <strong>继续创作</strong>
        <span>第三章 · 雨夜港口</span>
      </button>
      <button class="button right" type="button">
        <strong>历史创作</strong>
        <span>查看过往草稿与版本</span>
      </button>
    </section>
    <div class="hint">背景重度虚化 · 更白米白按钮 · 同水平落点</div>
    <div class="replay">点击画面重播</div>
  </main>
  <script>
    document.querySelector(".replay").addEventListener("click", (event) => {
      event.stopPropagation();
      const stage = document.querySelector(".stage");
      stage.style.animation = "none";
      stage.offsetHeight;
      for (const node of document.querySelectorAll(".home, .veil, .focus-glow, .button")) {
        node.style.animation = "none";
        node.offsetHeight;
        node.style.animation = "";
      }
    });
  </script>
</body>
</html>
