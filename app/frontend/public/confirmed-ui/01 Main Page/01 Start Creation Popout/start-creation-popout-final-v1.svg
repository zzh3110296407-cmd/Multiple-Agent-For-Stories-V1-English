<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Start Creation Expanded State v7</title>
  <desc id="desc">Homepage interaction state with three whiter ivory buttons blooming from the Start Creation origin and landing on one horizontal line.</desc>
  <defs>
    <filter id="backgroundBlur" x="-4%" y="-4%" width="108%" height="108%">
      <feGaussianBlur stdDeviation="19"/>
    </filter>
    <filter id="softButtonShadow" x="-30%" y="-80%" width="160%" height="260%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5B4A42" flood-opacity=".20"/>
    </filter>
    <filter id="centerButtonShadow" x="-30%" y="-80%" width="160%" height="260%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#4F403A" flood-opacity=".27"/>
    </filter>
    <filter id="ambientGlow" x="-60%" y="-120%" width="220%" height="320%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <linearGradient id="buttonSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2EDE4" stop-opacity=".98"/>
      <stop offset=".58" stop-color="#E8DFD2" stop-opacity=".96"/>
      <stop offset="1" stop-color="#D9CDBB" stop-opacity=".92"/>
    </linearGradient>
    <linearGradient id="centerButtonFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2EDE4" stop-opacity=".98"/>
      <stop offset=".54" stop-color="#E8DFD2" stop-opacity=".96"/>
      <stop offset="1" stop-color="#D9CDBB" stop-opacity=".93"/>
    </linearGradient>
  </defs>

  <g id="blurred-homepage">
    <image href="assets/homepage-final-v1.png" xlink:href="assets/homepage-final-v1.png" x="-80" y="-56" width="1600" height="1136" preserveAspectRatio="xMidYMid slice" filter="url(#backgroundBlur)"/>
    <rect width="1440" height="1024" fill="#DDD4C6" opacity=".36"/>
    <rect width="1440" height="1024" fill="#CDBEAA" opacity=".18"/>
    <rect width="1440" height="1024" fill="#2F2D2A" opacity=".08"/>
  </g>

  <g id="focus-field">
    <ellipse cx="720" cy="560" rx="486" ry="230" fill="#D8C8B2" opacity=".14" filter="url(#ambientGlow)"/>
    <ellipse cx="720" cy="574" rx="384" ry="148" fill="#CDBEAA" opacity=".11"/>
    <ellipse cx="720" cy="646" rx="342" ry="46" fill="#51423C" opacity=".11" filter="url(#ambientGlow)"/>
    <path d="M720 640 C642 604 566 554 472 508" fill="none" stroke="#80685D" stroke-width="1.35" opacity=".24"/>
    <path d="M720 640 C720 600 720 554 720 508" fill="none" stroke="#80685D" stroke-width="1.35" opacity=".22"/>
    <path d="M720 640 C798 604 874 554 968 508" fill="none" stroke="#80685D" stroke-width="1.35" opacity=".24"/>
    <circle cx="720" cy="640" r="8" fill="#80685D" opacity=".30"/>
    <circle cx="720" cy="640" r="35" fill="none" stroke="#9E7E74" stroke-width="1.2" opacity=".20"/>
  </g>

  <g id="expanded-buttons" font-family="'Inter', 'Noto Sans SC', sans-serif">
    <g transform="translate(354 478)" filter="url(#softButtonShadow)">
      <rect x="0" y="0" width="236" height="60" rx="9" fill="#92766A" opacity=".18"/>
      <rect x="0" y="0" width="236" height="60" rx="9" fill="url(#buttonSheen)" opacity=".98" stroke="#EDE3D4" stroke-opacity=".48"/>
      <rect x="1.5" y="1.5" width="233" height="57" rx="8" fill="none" stroke="#7F685E" stroke-opacity=".36"/>
      <rect x="14" y="10" width="208" height="1" fill="#F4EADB" opacity=".28"/>
      <text x="118" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#34312E">新创作</text>
      <text x="118" y="48" text-anchor="middle" font-size="12" fill="#6A554D">开启一张新的故事长卷</text>
    </g>

    <g transform="translate(602 478)" filter="url(#centerButtonShadow)">
      <rect x="-3" y="-3" width="242" height="66" rx="12" fill="#4F403A" opacity=".15"/>
      <rect x="0" y="0" width="236" height="60" rx="9" fill="url(#centerButtonFill)" opacity=".98" stroke="#FFF8EE" stroke-opacity=".56"/>
      <rect x="1.5" y="1.5" width="233" height="57" rx="8" fill="#D8C8B2" opacity=".10" stroke="#7F685E" stroke-opacity=".32"/>
      <rect x="16" y="10" width="204" height="1" fill="#F0E6D8" opacity=".30"/>
      <text x="118" y="29" text-anchor="middle" font-size="18" font-weight="700" fill="#2F2D2A">继续创作</text>
      <text x="118" y="48" text-anchor="middle" font-size="12" fill="#42342F">第三章 · 雨夜港口</text>
    </g>

    <g transform="translate(850 478)" filter="url(#softButtonShadow)">
      <rect x="0" y="0" width="236" height="60" rx="9" fill="#92766A" opacity=".18"/>
      <rect x="0" y="0" width="236" height="60" rx="9" fill="url(#buttonSheen)" opacity=".98" stroke="#EDE3D4" stroke-opacity=".48"/>
      <rect x="1.5" y="1.5" width="233" height="57" rx="8" fill="none" stroke="#7F685E" stroke-opacity=".36"/>
      <rect x="14" y="10" width="208" height="1" fill="#F4EADB" opacity=".28"/>
      <text x="118" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#34312E">历史创作</text>
      <text x="118" y="48" text-anchor="middle" font-size="12" fill="#6A554D">查看过往草稿与版本</text>
    </g>
  </g>

  <g id="motion-notes" transform="translate(88 910)" font-family="'Inter', 'Noto Sans SC', sans-serif">
    <text x="0" y="0" font-size="13" fill="#726A63">展开状态 v7</text>
    <text x="0" y="31" font-size="17" fill="#383431">重度背景虚化 · 更白米白按钮同水平落点</text>
  </g>

  <g transform="translate(1096 910)" font-family="'Inter', 'Noto Sans SC', sans-serif">
    <text x="228" y="0" text-anchor="end" font-size="13" fill="#726A63">交互节奏</text>
    <text x="228" y="31" text-anchor="end" font-size="17" fill="#383431">从原点弹出，最终同一水平线</text>
  </g>
</svg>
