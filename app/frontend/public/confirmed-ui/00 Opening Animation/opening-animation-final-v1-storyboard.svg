        <rect x="336" y="152" width="240" height="520" fill="url(#paperGlow)" opacity=".82"/>
        <path d="M292 180 C370 234 360 362 302 456 C256 530 282 610 370 672 L336 672 L336 152 L306 152Z" fill="#ECE7DC" opacity=".35"/>
        <path d="M368 628 C440 592 468 542 514 562" fill="none" stroke="#B48A78" stroke-width="1.4" opacity=".36"/>
        <g filter="url(#dustBlur)" opacity=".42">
          <circle cx="396" cy="330" r="3" fill="#B48A78"/>
          <circle cx="492" cy="258" r="2" fill="#B48A78"/>
          <circle cx="522" cy="486" r="2.6" fill="#B48A78"/>
        </g>
      </g>
    </g>
    <text x="356" y="708" font-size="13" fill="#8A6257">0.35-0.95s</text>
    <text x="356" y="738" font-size="19" font-weight="700" fill="#383431">纸面苏醒</text>
    <text x="356" y="768" font-size="14" fill="#655E57">中心亮起，旧稿纹理展开</text>

    <g filter="url(#cardShadow)">
      <rect x="600" y="152" width="240" height="520" rx="8" fill="#E9DDBF"/>
      <g clip-path="url(#panel3)">
        <image href="assets/main-page-story-workbench-background-v5.png" xlink:href="assets/main-page-story-workbench-background-v5.png" x="600" y="152" width="240" height="520" preserveAspectRatio="xMidYMid slice" opacity="1"/>
        <rect x="600" y="152" width="240" height="520" fill="#ECE7DC" opacity=".12"/>
        <path d="M612 240 C708 202 774 228 848 178" fill="none" stroke="#B48A78" stroke-width="2" opacity=".30"/>
        <circle cx="706" cy="368" r="70" fill="#ECE7DC" opacity=".12"/>
        <text x="720" y="508" text-anchor="middle" font-size="15" fill="#4D403B">dragon shadow settles</text>
      </g>
    </g>
    <text x="620" y="708" font-size="13" fill="#8A6257">0.95-1.55s</text>
    <text x="620" y="738" font-size="19" font-weight="700" fill="#383431">龙影成形</text>
    <text x="620" y="768" font-size="14" fill="#655E57">非黑色远影，轻微视差</text>

    <g filter="url(#cardShadow)">
      <rect x="864" y="152" width="240" height="520" rx="8" fill="#E9DDBF"/>
      <g clip-path="url(#panel4)">
        <image href="assets/main-page-story-workbench-background-v5.png" xlink:href="assets/main-page-story-workbench-background-v5.png" x="864" y="152" width="240" height="520" preserveAspectRatio="xMidYMid slice" opacity="1"/>
        <rect x="864" y="152" width="240" height="520" fill="#ECE7DC" opacity=".16"/>
        <rect x="942" y="330" width="84" height="84" rx="8" fill="#B48A78" opacity=".94"/>
        <path d="M968 382 C976 356 994 356 1002 380" fill="none" stroke="#F2E8D6" stroke-width="3" stroke-linecap="round"/>
        <path d="M970 384 C982 376 994 376 1001 384" fill="none" stroke="#F2E8D6" stroke-width="3" stroke-linecap="round"/>
        <text x="984" y="458" text-anchor="middle" font-size="24" font-weight="700" fill="#2F2D2A">Multiple Agent</text>
        <text x="984" y="488" text-anchor="middle" font-size="16" fill="#5D5650">For Stories</text>
        <path d="M920 526 C962 506 1010 506 1052 526" fill="none" stroke="#B48A78" stroke-width="1.5" opacity=".42"/>
      </g>
    </g>
    <text x="884" y="708" font-size="13" fill="#8A6257">1.55-2.15s</text>
    <text x="884" y="738" font-size="19" font-weight="700" fill="#383431">标题入场</text>
    <text x="884" y="768" font-size="14" fill="#655E57">墨迹聚焦，品牌轻显现</text>

    <g filter="url(#cardShadow)">
      <rect x="1128" y="152" width="240" height="520" rx="8" fill="#E9DDBF"/>
      <g clip-path="url(#panel5)">
        <image href="assets/main-page-story-workbench-background-v5.png" xlink:href="assets/main-page-story-workbench-background-v5.png" x="1128" y="152" width="240" height="520" preserveAspectRatio="xMidYMid slice" opacity=".86"/>
        <rect x="1128" y="152" width="240" height="520" fill="#ECE7DC" opacity=".14"/>
        <rect x="1144" y="328" width="208" height="148" rx="6" fill="#ECE7DC" opacity=".92" stroke="#FFFFFF" stroke-opacity=".68"/>
        <image href="assets/homepage-final-v1.png" xlink:href="assets/homepage-final-v1.png" x="1144" y="328" width="208" height="148" preserveAspectRatio="xMidYMid meet"/>
        <text x="1248" y="522" text-anchor="middle" font-size="15" fill="#4D403B">homepage settles</text>
      </g>
    </g>
    <text x="1148" y="708" font-size="13" fill="#8A6257">2.15-2.85s</text>
    <text x="1148" y="738" font-size="19" font-weight="700" fill="#383431">落到主页</text>
    <text x="1148" y="768" font-size="14" fill="#655E57">UI 控件淡入最终位置</text>
  </g>

  <g transform="translate(176 858)" font-family="'Inter', 'Noto Sans SC', sans-serif">
    <path d="M0 0 H1088" stroke="#B48A78" stroke-width="2" opacity=".32"/>
    <g fill="#B48A78">
      <circle cx="0" cy="0" r="7"/>
      <circle cx="272" cy="0" r="7"/>
      <circle cx="544" cy="0" r="7"/>
      <circle cx="816" cy="0" r="7"/>
      <circle cx="1088" cy="0" r="7"/>
    </g>
    <text x="0" y="42" text-anchor="middle" font-size="13" fill="#655E57">暗场</text>
    <text x="272" y="42" text-anchor="middle" font-size="13" fill="#655E57">纸面</text>
    <text x="544" y="42" text-anchor="middle" font-size="13" fill="#655E57">龙影</text>
    <text x="816" y="42" text-anchor="middle" font-size="13" fill="#655E57">标题</text>
    <text x="1088" y="42" text-anchor="middle" font-size="13" fill="#655E57">主页</text>
  </g>

  <text x="720" y="958" text-anchor="middle" font-family="'Inter', 'Noto Sans SC', sans-serif" font-size="15" fill="#5D5650">Skip after 0.4s · Reduced motion: 350-500ms crossfade into homepage · Total target: under 3s</text>
</svg>
