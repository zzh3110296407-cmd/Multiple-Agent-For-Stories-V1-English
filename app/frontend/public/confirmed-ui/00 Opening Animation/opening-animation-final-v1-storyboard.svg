<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="title desc">
  <title id="title">Opening Animation Storyboard v1</title>
  <desc id="desc">Five-frame storyboard for the opening animation that transitions into the confirmed parchment dragon homepage.</desc>
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#6F4F45" flood-opacity=".16"/>
    </filter>
    <filter id="dustBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <clipPath id="panel1"><rect x="72" y="152" width="240" height="520" rx="8"/></clipPath>
    <clipPath id="panel2"><rect x="336" y="152" width="240" height="520" rx="8"/></clipPath>
    <clipPath id="panel3"><rect x="600" y="152" width="240" height="520" rx="8"/></clipPath>
    <clipPath id="panel4"><rect x="864" y="152" width="240" height="520" rx="8"/></clipPath>
    <clipPath id="panel5"><rect x="1128" y="152" width="240" height="520" rx="8"/></clipPath>
    <linearGradient id="darkVeil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2F2420"/>
      <stop offset=".55" stop-color="#6E4F43"/>
      <stop offset="1" stop-color="#B48A78"/>
    </linearGradient>
    <radialGradient id="paperGlow" cx=".46" cy=".42" r=".75">
      <stop offset="0" stop-color="#F2E8D6" stop-opacity=".96"/>
      <stop offset=".52" stop-color="#E9DDBF" stop-opacity=".74"/>
      <stop offset="1" stop-color="#B48A78" stop-opacity=".28"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="1024" fill="#ECE7DC"/>
  <image href="assets/main-page-story-workbench-background-v5.png" xlink:href="assets/main-page-story-workbench-background-v5.png" x="0" y="0" width="1440" height="1024" preserveAspectRatio="xMidYMid slice" opacity=".18"/>
  <rect width="1440" height="1024" fill="#ECE7DC" opacity=".62"/>

  <text x="72" y="70" font-family="'Inter', 'Noto Sans SC', sans-serif" font-size="28" font-weight="700" fill="#2F2D2A" letter-spacing="0">Opening Animation · The Manuscript Wakes</text>
  <text x="72" y="106" font-family="'Inter', 'Noto Sans SC', sans-serif" font-size="16" fill="#655E57" letter-spacing="0">A restrained 2.6s-2.9s transition from parchment dust to the confirmed dragon homepage.</text>

  <g font-family="'Inter', 'Noto Sans SC', sans-serif">
    <g filter="url(#cardShadow)">
      <rect x="72" y="152" width="240" height="520" rx="8" fill="#E9DDBF"/>
      <g clip-path="url(#panel1)">
        <image href="assets/main-page-story-workbench-background-v5.png" xlink:href="assets/main-page-story-workbench-background-v5.png" x="72" y="152" width="240" height="520" preserveAspectRatio="xMidYMid slice" opacity=".24"/>
        <rect x="72" y="152" width="240" height="520" fill="url(#darkVeil)" opacity=".86"/>
        <circle cx="138" cy="260" r="2.4" fill="#E9DDBF" opacity=".45"/>
        <circle cx="182" cy="404" r="1.8" fill="#ECE7DC" opacity=".38"/>
        <circle cx="254" cy="330" r="2.2" fill="#E9DDBF" opacity=".28"/>
        <path d="M100 514 C148 492 190 512 255 472" fill="none" stroke="#E9DDBF" stroke-width="1" opacity=".24"/>
        <rect x="72" y="152" width="240" height="520" fill="#2F2420" opacity=".22"/>
      </g>
    </g>
    <text x="92" y="708" font-size="13" fill="#8A6257">0.00-0.35s</text>
    <text x="92" y="738" font-size="19" font-weight="700" fill="#383431">暗色羊皮纸</text>
    <text x="92" y="768" font-size="14" fill="#655E57">低光、纸尘、纤维浮现</text>

    <g filter="url(#cardShadow)">
      <rect x="336" y="152" width="240" height="520" rx="8" fill="#E9DDBF"/>
      <g clip-path="url(#panel2)">
